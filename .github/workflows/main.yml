name: Snakemake Workflow Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches_ignore: []
  workflow_dispatch:

jobs:
  r-format-suggest:
    name: r-format-suggest
    runs-on: ubuntu-latest

    permissions:
      # Required to push suggestion comments to the PR
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install
        uses: posit-dev/setup-air@v1

      - name: Format
        run: air format .

      - name: Suggest
        uses: reviewdog/action-suggester@v1
        with:
          level: error
          fail_level: error
          tool_name: air

  py-format:
    name: py-format
    runs-on: ubuntu-latest
    permissions:
      # Required to push suggestion comments to the PR
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  py-tests:
    name: py-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pytest
        run: pip install pytest
      # test_common_helpers.py imports `common` (Snakemake DSL, not importable as Python);
      # excluded until rewritten or removed. R tests deferred — see TODO.md.
      - name: Run unit tests
        run: pytest tests/unit/ --ignore=tests/unit/test_common_helpers.py -v

  snk-linting:
    name: snk-linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Linting
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .
          snakefile: workflow/Snakefile
          args: "--lint"

  snk-testing:
    name: snk-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dry-run workflow
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .
          snakefile: workflow/Snakefile
          args: >-
            --conda-cleanup-pkgs cache
            --software-deployment-method conda
            --show-failed-logs
            --dry-run
